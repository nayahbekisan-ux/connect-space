<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Connect Space</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f9f7;
      color: #333;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #4caf50;
      color: white;
      text-align: center;
      padding: 1.5rem;
    }
    nav {
      background-color: #e8f5e9;
      padding: 1rem;
      text-align: center;
    }
    nav a {
      margin: 0 1rem;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }
    section {
      padding: 2rem;
      max-width: 800px;
      margin: auto;
    }
    h2 {
      color: #4caf50;
    }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    footer {
      background-color: #4caf50;

      margin-top: 2rem;

</head>
<body>
  <header>
    <h1>Connect Space</h1>

  </header>

  <nav>
    <a href="#">Articles</a>
    <a href="#">Forums</a>
    <a href="#">Reminders</a>
    <a href="#">Community</a>
  </nav>

  <section>
    <h2>Features</h2>

    <div class="card">
      <h3>Simple Wellness Articles</h3>
    </div>

    <div class="card">
      <h3>Community Support Forum
    </div>

    <div class="card">
      <h3>User Experience Sharing</h3>
    </div>

    <div class="card">
      <h3>Daily Habit Reminders</h3>
    </div>

    <div class="card">
      <h3>Clean and Calming UI</h3>
    </div>

  <footer>

  </footer>
